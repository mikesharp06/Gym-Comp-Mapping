<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MPLS Gym Map — Membership Pricing</title>

  <!-- Leaflet -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <!-- Sidebar -->
    <aside class="sidebar">
      <header class="brand">
        <div class="brand-mark" aria-hidden="true">▲</div>
        <div>
          <h1 class="brand-title">MPLS Gym Map</h1>
          <p class="brand-sub">Membership pricing across the Twin Cities</p>
        </div>
      </header>

      <div class="controls">
        <label class="field">
          <span class="field-label">Search</span>
          <input
            type="search"
            id="search"
            class="input"
            placeholder="Gym name, neighborhood, category…"
            autocomplete="off"
          />
        </label>

        <label class="field">
          <span class="field-label">Sort by</span>
          <select id="sort" class="input">
            <option value="price-asc">Price: low to high</option>
            <option value="price-desc">Price: high to low</option>
            <option value="name">Name (A–Z)</option>
          </select>
        </label>

        <!-- Price ladder: doubles as a legend AND a filter. Click a tier to toggle it. -->
        <div class="field">
          <span class="field-label">Price tier <em class="hint">(tap to filter)</em></span>
          <div class="ladder" id="ladder" role="group" aria-label="Filter by price tier"></div>
        </div>

        <!-- Category filter, built from the data -->
        <div class="field">
          <span class="field-label">Category</span>
          <div class="chips" id="categories" role="group" aria-label="Filter by category"></div>
        </div>
      </div>

      <div class="list-head">
        <span id="count" class="count">—</span>
        <button id="reset" class="reset" type="button">Reset filters</button>
      </div>

      <ul class="list" id="list" aria-label="Gym list"></ul>

      <p class="attribution">
        
      </p>
    </aside>

    <!-- Map -->
    <main class="map-wrap">
      <div id="map"></div>
      <div id="notice" class="notice" hidden></div>
    </main>
  </div>

  <!-- Libraries -->
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

  <script src="app.js"></script>
</body>
</html>
